name: Update VPN Subscription

on:
  workflow_dispatch:      # Кнопка для ручного запуска
  schedule:
    - cron: '0 * * * *'  # Автозапуск в начале каждого часа

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ultra_sub.txt
          # Коммитим только если файл реально изменился
          git commit -m "Hourly update: 300 fresh nodes" || echo "No changes to commit"
          git push origin main
