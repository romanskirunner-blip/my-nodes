name: Update VPN Subscription
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Явное требование прав на запись
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Используем встроенный ключ доступа
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ultra_sub.txt
          # Фикс: проверяем изменения перед коммитом
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update nodes" && git push origin main)
